services:
  caddy:
    image: caddy:2.8-alpine
    container_name: d3mvpn-caddy
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
    name: vpn-shop-edge
    external: true
