services:
  postgres:
    image: postgres:16-alpine
    container_name: d3mvpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: d3mvpn
      POSTGRES_PASSWORD: d3mvpn
      POSTGRES_DB: d3mvpn_shop
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: d3mvpn-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    container_name: d3mvpn-backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run prisma:seed && npm run start"

  frontend:
    build:
      context: ./frontend
    container_name: d3mvpn-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2.8-alpine
    container_name: d3mvpn-caddy
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
