services:
  postgres:
    image: postgres:16-alpine
    container_name: d3mvpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: d3mvpn
      POSTGRES_PASSWORD: d3mvpn
      POSTGRES_DB: d3mvpn_shop
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: d3mvpn-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    container_name: d3mvpn-backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run prisma:seed && npm run start"
    networks:
      - default
      - edge

  frontend:
    build:
      context: ./frontend-new
      dockerfile: Dockerfile
    container_name: d3mvpn-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    networks:
      - default
      - edge

volumes:
  postgres_data:

networks:
  edge:
    name: vpn-shop-edge
    external: true
